<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>AS26 Analytics – Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
    /* ── Dashboard Layout ── */
    .adm { max-width: 960px; margin: 0 auto; padding: 1rem; font-family: 'PT Sans', sans-serif; }
    .adm h1 { font-size: 1.4rem; margin: 0 0 .5rem; color: var(--as-braun-dark, #372F2C); }
    .adm-auth { text-align: center; margin-top: 3rem; }
    .adm-auth input { padding: .5rem .8rem; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; width: 240px; }
    .adm-auth button { padding: .5rem 1rem; background: var(--as-rot, #CF3628); color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-left: .5rem; }

    /* ── Filter ── */
    .adm-filters { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .adm-filters select, .adm-filters input[type=date] {
        padding: .35rem .6rem; border: 1px solid #ccc; border-radius: 6px; font-size: .88rem; font-family: inherit;
    }
    .adm-filters button { padding: .35rem .8rem; background: var(--as-rot); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .88rem; }

    /* ── KPI Kacheln ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: .75rem; margin-bottom: 1.5rem; }
    .kpi { background: #fff; border-radius: 10px; padding: .8rem; box-shadow: 0 1px 6px rgba(0,0,0,.08); text-align: center; }
    .kpi-val { font-size: 1.6rem; font-weight: 700; color: var(--as-rot, #CF3628); }
    .kpi-label { font-size: .78rem; color: #888; margin-top: .15rem; }

    /* ── Sections ── */
    .adm-section { background: #fff; border-radius: 10px; padding: 1rem; box-shadow: 0 1px 6px rgba(0,0,0,.08); margin-bottom: 1rem; }
    .adm-section h2 { font-size: 1rem; margin: 0 0 .75rem; color: var(--as-braun-dark); }

    /* ── Tabellen ── */
    .adm-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .adm-table th { text-align: left; padding: .4rem .5rem; border-bottom: 2px solid #eee; color: #888; font-weight: 600; }
    .adm-table td { padding: .4rem .5rem; border-bottom: 1px solid #f0f0f0; }
    .adm-table tr:last-child td { border-bottom: none; }

    /* ── Balkendiagramm ── */
    .bar-chart { display: flex; flex-direction: column; gap: .4rem; }
    .bar-row { display: flex; align-items: center; gap: .5rem; }
    .bar-label { width: 80px; font-size: .82rem; text-align: right; color: #555; flex-shrink: 0; }
    .bar-track { flex: 1; height: 22px; background: #f0ebe6; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--as-rot, #CF3628); border-radius: 4px; transition: width .3s; display: flex; align-items: center; padding: 0 .4rem; }
    .bar-fill span { font-size: .75rem; color: #fff; font-weight: 700; white-space: nowrap; }

    /* ── Trend-Sparkline (canvas) ── */
    .trend-canvas { width: 100%; height: 120px; }

    /* ── Export ── */
    .adm-export { text-align: right; margin-top: .5rem; }
    .adm-export button { background: none; border: 1px solid #ccc; border-radius: 6px; padding: .3rem .7rem; cursor: pointer; font-size: .82rem; color: #555; }
    .adm-export button:hover { background: #f5f0eb; }

    /* ── App-Feedback Detail ── */
    .kpi.clickable { cursor: pointer; transition: box-shadow .15s; }
    .kpi.clickable:hover { box-shadow: 0 2px 12px rgba(207,54,40,.2); }
    .afb-stars { color: var(--as-orange, #F18864); font-size: .9rem; }
    .afb-comment { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: .8rem; color: #555; }
    .afb-nps-badge { display: inline-block; padding: .1rem .4rem; border-radius: 4px; font-size: .8rem; font-weight: 700; }
    .afb-nps-promo { background: #d4edda; color: #155724; }
    .afb-nps-pass  { background: #fff3cd; color: #856404; }
    .afb-nps-detract { background: #f8d7da; color: #721c24; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
        .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        .bar-label { width: 60px; font-size: .75rem; }
    }
    </style>
</head>
<body style="background: #f5f0eb;">

<div class="adm" id="app">
    <!-- Auth -->
    <div class="adm-auth" id="auth-form">
        <h1>AS26 Analytics</h1>
        <p style="color:#888;margin-bottom:1rem;">Admin-Zugang erforderlich</p>
        <input type="password" id="secret-input" placeholder="Admin-Secret">
        <button onclick="doLogin()">Öffnen</button>
    </div>

    <!-- Dashboard (hidden until auth) -->
    <div id="dashboard" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;">
            <h1>📊 AS26 Analytics</h1>
            <a href="/" style="font-size:.85rem;color:#888;">← Zurück</a>
        </div>

        <!-- Filter -->
        <div class="adm-filters">
            <select id="range-preset">
                <option value="7">Letzte 7 Tage</option>
                <option value="30" selected>Letzte 30 Tage</option>
                <option value="90">Letzte 90 Tage</option>
                <option value="custom">Eigener Zeitraum</option>
            </select>
            <input type="date" id="date-from" style="display:none;">
            <input type="date" id="date-to" style="display:none;">
            <button onclick="loadData()">Laden</button>
        </div>

        <!-- KPIs -->
        <div class="kpi-grid" id="kpis"></div>

        <!-- Trend -->
        <div class="adm-section">
            <h2>Verlauf</h2>
            <canvas class="trend-canvas" id="trend-chart"></canvas>
        </div>

        <!-- Geräte + Browser -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="adm-section">
                <h2>Geräte</h2>
                <div class="bar-chart" id="device-chart"></div>
            </div>
            <div class="adm-section">
                <h2>Browser</h2>
                <div class="bar-chart" id="browser-chart"></div>
            </div>
        </div>

        <!-- OS -->
        <div class="adm-section">
            <h2>Betriebssysteme</h2>
            <div class="bar-chart" id="os-chart"></div>
        </div>

        <!-- Chat -->
        <div class="adm-section">
            <h2>💬 Chat-Assistent</h2>
            <div class="kpi-grid" id="chat-kpis"></div>
        </div>

        <!-- App-Feedback -->
        <div class="adm-section">
            <h2>⭐ App-Feedback</h2>
            <div class="kpi-grid" id="app-feedback-kpis"><div class="kpi"><div class="kpi-val" style="font-size:1rem;color:#aaa">…</div><div class="kpi-label">wird geladen</div></div></div>
            <div id="app-feedback-comments" style="display:none;margin-top:.75rem;">
                <div style="font-size:.82rem;font-weight:600;color:#888;margin-bottom:.4rem;">Freitext-Kommentare</div>
                <table class="adm-table">
                    <thead><tr><th>Datum</th><th>Verbesserung</th><th>Feature-Wunsch</th></tr></thead>
                    <tbody id="app-feedback-comments-tbody"></tbody>
                </table>
                <div id="app-feedback-load-more" style="display:none;text-align:center;margin-top:.5rem;">
                    <button onclick="loadMoreFeedback()" style="background:none;border:1px solid #ccc;border-radius:6px;padding:.3rem .7rem;cursor:pointer;font-size:.82rem;color:#555;">Mehr laden</button>
                </div>
            </div>
        </div>

        <!-- Top Pages -->
        <div class="adm-section">
            <h2>Top-Seiten</h2>
            <table class="adm-table" id="top-pages-table">
                <thead><tr><th>Seite</th><th>Aufrufe</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Export -->
        <div class="adm-export">
            <button onclick="exportCSV()">📥 CSV-Export</button>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    var secret = '';
    var data = { daily: [], live: null };
    var pageNames = {};

    // ── Auth ─────────────────────────────────────────────────────────
    function doLogin() {
        if (!secret) secret = document.getElementById('secret-input').value.trim();
        if (!secret) return;
        sessionStorage.setItem('asa_admin_secret', secret);
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadData();
    }
    window.doLogin = doLogin;

    // ?admin=... Parameter auswerten (wie auf den anderen Seiten)
    var p = new URLSearchParams(location.search);
    var adminParam = p.get('admin');
    if (adminParam) {
        secret = adminParam;
        sessionStorage.setItem('asa_admin_secret', secret);
        p.delete('admin');
        history.replaceState(null, '', location.pathname + (p.toString() ? '?' + p : '') + location.hash);
    }

    // Check sessionStorage
    var stored = sessionStorage.getItem('asa_admin_secret');
    if (stored && !secret) {
        secret = stored;
    }

    if (secret) {
        doLogin();
    }

    document.getElementById('secret-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') doLogin();
    });

    // ── Range-Preset ─────────────────────────────────────────────────
    document.getElementById('range-preset').addEventListener('change', function () {
        var custom = this.value === 'custom';
        document.getElementById('date-from').style.display = custom ? '' : 'none';
        document.getElementById('date-to').style.display = custom ? '' : 'none';
        if (!custom) loadData();
    });

    // ── Daten laden ──────────────────────────────────────────────────
    window.loadData = loadData;
    // ── Seitennamen-Lookup (Workshop-IDs → Titel) ─────────────────

    function loadPageNames() {
        if (pageNames && Object.keys(pageNames).length > 0) return Promise.resolve();
        return Promise.all([
            fetch('/api/workshops.json').then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
            fetch('/api/aussteller.json').then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
        ]).then(function (results) {
            var ws = results[0];
            var aus = results[1];
            if (ws && ws.workshops) {
                ws.workshops.forEach(function (w) {
                    pageNames['/w/' + w.id] = w.title;
                });
            }
            if (aus && aus.aussteller) {
                aus.aussteller.forEach(function (a) {
                    pageNames['#id=' + a.id] = a.firma;
                });
            }
        });
    }

    function resolvePageName(path) {
        // Exakter Match: /w/<id>
        if (pageNames[path]) return pageNames[path];
        // Sub-Pfade: /w/<id>/feedback, /w/<id>/qa etc.
        var m = path.match(/^\/w\/([a-f0-9\-]{32,36})(\/.*)?$/);
        if (m) {
            var base = '/w/' + m[1];
            var suffix = m[2] || '';
            var label = pageNames[base] || m[1].substring(0, 8) + '…';
            if (suffix === '/feedback') return label + ' (Feedback)';
            if (suffix === '/qa')       return label + ' (Q&A)';
            if (suffix === '/wall')     return label + ' (Wall)';
            return label;
        }
        // Bekannte statische Seiten
        var staticNames = {
            '/': 'Startseite',
            '/programm': 'Programm', '/programm.html': 'Programm',
            '/aussteller': 'Aussteller', '/aussteller.html': 'Aussteller',
            '/experten': 'Experten', '/experten.html': 'Experten',
            '/faq': 'FAQ', '/faq.html': 'FAQ',
            '/impressum': 'Impressum', '/impressum.html': 'Impressum',
        };
        return staticNames[path] || path;
    }

    function loadData() {
        var preset = document.getElementById('range-preset').value;
        var from, to;

        if (preset === 'custom') {
            from = document.getElementById('date-from').value;
            to   = document.getElementById('date-to').value;
            if (!from || !to) return;
        } else {
            var d = new Date();
            to = fmt(d);
            d.setDate(d.getDate() - parseInt(preset, 10));
            from = fmt(d);
        }

        var url = '/api/analytics-data.php?secret=' + encodeURIComponent(secret)
            + '&from=' + from + '&to=' + to + '&live=1';

        Promise.all([
            fetch(url).then(function (r) {
                if (r.status === 403) { alert('Ungültiges Secret'); return null; }
                return r.json();
            }),
            loadPageNames(),
        ]).then(function (results) {
                var d = results[0];
                if (!d || !d.ok) return;
                data = d;
                render();
            })
            .catch(function () { alert('Verbindungsfehler'); });
    };

    // ── Render ───────────────────────────────────────────────────────
    function render() {
        renderKPIs();
        renderTrend();
        renderBars('device-chart', aggregateField('device_'));
        renderBars('browser-chart', aggregateField('browser_'));
        renderBars('os-chart', aggregateField('os_'));
        renderChatKPIs();
        renderAppFeedbackKPIs();
        renderTopPages();
    }

    // ── KPI-Kacheln ──────────────────────────────────────────────────
    function renderKPIs() {
        var totals = sumFields(['sessions', 'page_views', 'installs', 'standalone_opens']);
        var avgDur = avgField('avg_session_duration_seconds');

        var kpis = [
            { val: totals.sessions, label: 'Sessions' },
            { val: totals.page_views, label: 'Page Views' },
            { val: fmtDur(avgDur), label: 'Ø Sitzungsdauer' },
            { val: totals.installs, label: 'Installationen' },
            { val: totals.standalone_opens, label: 'Via Home-Screen' },
            { val: data.daily.length, label: 'Tage mit Daten' },
        ];

        var el = document.getElementById('kpis');
        el.innerHTML = kpis.map(function (k) {
            return '<div class="kpi"><div class="kpi-val">' + k.val + '</div><div class="kpi-label">' + k.label + '</div></div>';
        }).join('');
    }

    // ── Chat-KPIs ────────────────────────────────────────────────────
    function renderChatKPIs() {
        var totals = sumFields(['chat_sessions', 'chat_messages', 'chat_card_clicks', 'chat_favorites_added']);
        var avgMsgsPerSession = totals.chat_sessions > 0
            ? (totals.chat_messages / totals.chat_sessions).toFixed(1)
            : '0';

        var kpis = [
            { val: totals.chat_sessions, label: 'Chat-Öffnungen' },
            { val: totals.chat_messages, label: 'Nachrichten' },
            { val: avgMsgsPerSession, label: 'Ø Msgs/Chat' },
            { val: totals.chat_card_clicks, label: 'Card-Klicks' },
            { val: totals.chat_favorites_added, label: 'Favoriten aus Chat' },
        ];

        document.getElementById('chat-kpis').innerHTML = kpis.map(function (k) {
            return '<div class="kpi"><div class="kpi-val">' + k.val + '</div><div class="kpi-label">' + k.label + '</div></div>';
        }).join('');
    }

    // ── App-Feedback ────────────────────────────────────────────────────
    var afbData = [];
    var afbCursor = null;
    var afbHasMore = false;
    var afbLoaded = false;

    function renderAppFeedbackKPIs() {
        if (!afbLoaded) {
            afbLoaded = true; // Guard against double-fetch on re-render
            afbLoadData(null);
        }
    }

    window.loadMoreFeedback = function () {
        if (afbHasMore && afbCursor) afbLoadData(afbCursor);
    };

    function afbLoadData(cursor) {
        var url = '/api/app-feedback-data.php?secret=' + encodeURIComponent(secret);
        if (cursor) url += '&cursor=' + encodeURIComponent(cursor);

        fetch(url)
            .then(function (r) { return r.json(); })
            .then(function (d) {
                if (!d || !d.ok) {
                    afbSetKpis([{ val: '–', label: 'Laden fehlgeschlagen' }]);
                    return;
                }
                afbData = afbData.concat(d.items || []);
                afbCursor = d.next_cursor || null;
                afbHasMore = !!(d.has_more && afbCursor);
                afbRenderKpis();
                afbRenderComments();
            })
            .catch(function (e) {
                console.error('app-feedback-data fetch failed:', e);
                afbSetKpis([{ val: '–', label: 'Keine Verbindung' }]);
            });
    }

    function afbSetKpis(kpis) {
        var el = document.getElementById('app-feedback-kpis');
        if (!el) return;
        el.innerHTML = kpis.map(function (k) {
            return '<div class="kpi"><div class="kpi-val">' + k.val + '</div><div class="kpi-label">' + esc(k.label) + '</div></div>';
        }).join('');
    }

    function afbAvg(field) {
        var vals = [];
        for (var i = 0; i < afbData.length; i++) {
            var v = afbData[i][field];
            if (v !== null && v !== undefined && !isNaN(v)) vals.push(Number(v));
        }
        if (!vals.length) return null;
        var sum = 0;
        for (var j = 0; j < vals.length; j++) sum += vals[j];
        return sum / vals.length;
    }

    function afbStars(v) {
        if (v === null || v === undefined) return '–';
        var full = Math.min(5, Math.max(0, Math.round(v)));
        var empty = 5 - full;
        var stars = '';
        for (var i = 0; i < full; i++) stars += '★';
        var grey = '';
        for (var j = 0; j < empty; j++) grey += '★';
        return '<span class="afb-stars">' + stars + '<span style="color:#ddd">' + grey + '</span></span> <small style="color:#888">' + v.toFixed(1) + '</small>';
    }

    function afbRenderKpis() {
        var total  = afbData.length;
        var avgApp = afbAvg('app_bewertung');
        var avgNav = afbAvg('navigation');
        var avgSpd = afbAvg('ladegeschwindigkeit');
        var avgNtz = afbAvg('nuetzlichkeit');
        var avgNps = afbAvg('nps');

        afbSetKpis([
            { val: total,                                      label: 'Feedbacks gesamt' },
            { val: afbStars(avgApp),                          label: 'App gesamt' },
            { val: afbStars(avgNav),                          label: 'Navigation' },
            { val: afbStars(avgSpd),                          label: 'Ladezeit' },
            { val: afbStars(avgNtz),                          label: 'Nützlichkeit' },
            { val: avgNps !== null ? avgNps.toFixed(1) : '–', label: 'Ø NPS (0–10)' },
        ]);
    }

    function afbRenderComments() {
        var withText = [];
        for (var i = 0; i < afbData.length; i++) {
            if (afbData[i].verbesserung || afbData[i].feature_wunsch) withText.push(afbData[i]);
        }
        var commentsDiv = document.getElementById('app-feedback-comments');
        if (!commentsDiv) return;

        if (!withText.length) { commentsDiv.style.display = 'none'; return; }
        commentsDiv.style.display = '';

        var rows = '';
        for (var k = 0; k < withText.length; k++) {
            var fb = withText[k];
            var date = (fb.zeitstempel || '').substring(0, 10) || '–';
            rows += '<tr>' +
                '<td style="white-space:nowrap;font-size:.82rem;vertical-align:top">' + esc(date) + '</td>' +
                '<td style="font-size:.85rem;vertical-align:top">' + (fb.verbesserung ? esc(fb.verbesserung) : '<span style="color:#ccc">–</span>') + '</td>' +
                '<td style="font-size:.85rem;vertical-align:top">' + (fb.feature_wunsch ? esc(fb.feature_wunsch) : '<span style="color:#ccc">–</span>') + '</td>' +
                '</tr>';
        }
        var tbody = document.getElementById('app-feedback-comments-tbody');
        if (tbody) tbody.innerHTML = rows;

        var loadMoreEl = document.getElementById('app-feedback-load-more');
        if (loadMoreEl) loadMoreEl.style.display = afbHasMore ? '' : 'none';
    }

    // ── Trend-Chart (Canvas) ─────────────────────────────────────────
    function renderTrend() {
        var canvas = document.getElementById('trend-chart');
        var ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        var w = canvas.parentElement.clientWidth - 32;
        var h = 120;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.scale(dpr, dpr);

        var days = data.daily;
        if (!days.length) { ctx.fillStyle = '#999'; ctx.fillText('Keine Daten', w / 2 - 30, h / 2); return; }

        var vals = days.map(function (d) { return d.sessions || 0; });
        var max = Math.max.apply(null, vals) || 1;
        var step = w / Math.max(vals.length - 1, 1);
        var padY = 16;
        var chartH = h - padY * 2;

        // Grid
        ctx.strokeStyle = '#eee';
        ctx.lineWidth = 1;
        for (var g = 0; g <= 4; g++) {
            var gy = padY + (chartH / 4) * g;
            ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
        }

        // Line
        ctx.strokeStyle = '#CF3628';
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        vals.forEach(function (v, i) {
            var x = i * step;
            var y = padY + chartH - (v / max) * chartH;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Dots
        ctx.fillStyle = '#CF3628';
        vals.forEach(function (v, i) {
            var x = i * step;
            var y = padY + chartH - (v / max) * chartH;
            ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
        });

        // Labels
        ctx.fillStyle = '#999';
        ctx.font = '10px PT Sans, sans-serif';
        ctx.textAlign = 'center';
        var labelEvery = Math.max(1, Math.floor(days.length / 6));
        days.forEach(function (d, i) {
            if (i % labelEvery === 0 || i === days.length - 1) {
                ctx.fillText(d.date.slice(5), i * step, h - 2);
            }
        });

        // Max label
        ctx.textAlign = 'left';
        ctx.fillText(max + ' Sessions', 4, 12);
    }

    // ── Balkendiagramme ──────────────────────────────────────────────
    function renderBars(elId, items) {
        var max = Math.max.apply(null, items.map(function (i) { return i.val; })) || 1;
        var el = document.getElementById(elId);
        el.innerHTML = items.map(function (i) {
            var pct = Math.round((i.val / max) * 100);
            return '<div class="bar-row"><div class="bar-label">' + esc(i.label) + '</div>' +
                '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"><span>' + i.val + '</span></div></div></div>';
        }).join('');
    }

    // ── Top Pages ────────────────────────────────────────────────────
    function renderTopPages() {
        var merged = {};
        data.daily.forEach(function (d) {
            (d.top_pages || []).forEach(function (p) {
                var key = p.page || '?';
                // /w/<id>/details und /w/<id> zusammenführen
                key = key.replace(/^(\/w\/[a-f0-9\-]{32,36})\/details$/, '$1');
                // /home.html → /
                if (key === '/home.html') key = '/';
                merged[key] = (merged[key] || 0) + parseInt(p.cnt || 0, 10);
            });
        });

        var sorted = Object.keys(merged).map(function (k) { return { page: k, cnt: merged[k] }; });
        sorted.sort(function (a, b) { return b.cnt - a.cnt; });
        sorted = sorted.slice(0, 10);

        var tbody = document.querySelector('#top-pages-table tbody');
        tbody.innerHTML = sorted.map(function (p) {
            var name = resolvePageName(p.page);
            var display = name !== p.page
                ? esc(name) + ' <small style="color:#999">' + esc(p.page) + '</small>'
                : esc(p.page);
            return '<tr><td>' + display + '</td><td>' + p.cnt + '</td></tr>';
        }).join('') || '<tr><td colspan="2" style="color:#999;">Keine Daten</td></tr>';
    }

    // ── CSV-Export ────────────────────────────────────────────────────
    window.exportCSV = exportCSV;
    function exportCSV() {
        if (!data.daily.length) return;
        var keys = Object.keys(data.daily[0]).filter(function (k) {
            return k !== 'top_pages' && k !== 'top_features' && k !== 'top_pages_json' && k !== 'top_features_json';
        });
        var csv = keys.join(';') + '\n';
        data.daily.forEach(function (row) {
            csv += keys.map(function (k) { return row[k] ?? ''; }).join(';') + '\n';
        });

        var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'as26-analytics-' + fmt(new Date()) + '.csv';
        a.click();
        URL.revokeObjectURL(a.href);
    };

    // ── Helpers ──────────────────────────────────────────────────────
    function sumFields(fields) {
        var t = {};
        fields.forEach(function (f) { t[f] = 0; });
        data.daily.forEach(function (d) {
            fields.forEach(function (f) { t[f] += parseInt(d[f] || 0, 10); });
        });
        return t;
    }

    function avgField(field) {
        if (!data.daily.length) return 0;
        var sum = 0;
        data.daily.forEach(function (d) { sum += parseFloat(d[field] || 0); });
        return sum / data.daily.length;
    }

    function aggregateField(prefix) {
        var keys = {};
        data.daily.forEach(function (d) {
            Object.keys(d).forEach(function (k) {
                if (k.indexOf(prefix) === 0) {
                    var label = k.replace(prefix, '');
                    keys[label] = (keys[label] || 0) + parseInt(d[k] || 0, 10);
                }
            });
        });
        return Object.keys(keys).map(function (k) {
            return { label: capitalize(k), val: keys[k] };
        }).sort(function (a, b) { return b.val - a.val; });
    }

    function fmt(d) {
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }
    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
    function fmtDur(s) {
        var m = Math.floor(s / 60);
        var sec = Math.round(s % 60);
        return m + ':' + pad(sec);
    }
    function esc(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
})();
</script>

</body>
</html>
