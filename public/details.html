<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#372F2C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Details – AS26 Live</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/img/icon-192.png">
    <link rel="apple-touch-icon" href="/img/icon-192.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/programm.css">
    <script src="/js/ortmap.js" defer></script>
</head>
<body>
    <header>
        <a href="#" class="back" id="back-link">← Zurück</a>
        <div class="badge">Details</div>
    </header>
    <a href="/" class="logo-bar">
        <img src="/img/logo-southside.png" alt="Adventure Southside">
    </a>

    <main class="detail-content" id="detail-content">
        <div class="loading" id="detail-loading">Details werden geladen…</div>
    </main>

    <footer>
        <a href="/"><img src="/img/logo-southside.png" alt="" class="footer-logo"></a>
        <p>Adventure Southside 2026</p>
        <div class="footer-cta-row">
            <a href="https://adventuresouthside.com/" target="_blank" rel="noopener" class="ticket-btn">🎫 Ticket sichern</a>
            <button class="share-btn" onclick="(function(){var d={title:'AS26 Live – Dein Messe-Begleiter',text:'Schau dir die Selbstausbauer Academy auf der Adventure Southside 2026 an! Workshops, Referenten & Standplan – alles in einer App:',url:'https://agenda.adventuresouthside.com'};if(navigator.share){navigator.share(d).catch(function(){})}else{window.location.href='mailto:?subject='+encodeURIComponent(d.title)+'&body='+encodeURIComponent(d.text+'\n\n'+d.url)}})()"><svg style="vertical-align:middle;margin-right:.3rem" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 9V3l8 9-8 9v-6c-7.1 0-11.7 2.1-14.6 7C.8 15.3 4.2 10.1 14 9z"/></svg>Freunden empfehlen</button>
        </div>
        <p>
            <a href="/impressum.html">Impressum & Datenschutz</a>
            &nbsp;·&nbsp;
            <a href="/faq.html">FAQ & Hilfe</a>
        </p>
        <div class="footer-partners">
            <a href="https://adventuresouthside.com/selbstausbau-academy/" target="_blank" rel="noopener"><img src="/img/logo-academy.png" alt="Selbstausbauer Academy"></a>
            <a href="https://adventuresouthside.com/programm-adventure-southside/" target="_blank" rel="noopener"><img src="/img/logo-ecamper.png" alt="E-Mobility &amp; Friends"></a>
            <a href="https://adventuresouthside.com/roadtrip-girls/" target="_blank" rel="noopener"><img src="/img/logo-roadtripgirls.png" alt="Roadtrip Girls"></a>
        </div>
    </footer>

    <script>
    (function() {
        'use strict';

        const API_URL = '/api/workshops.json';
        const AUSSTELLER_URL = '/api/aussteller.json';
        const STORAGE_KEY = 'asa_favorites';
        const ADMIN_KEY = 'asa_admin_secret';
        let backUrl = null;

        // ── Admin-Modus ──────────────────────────────────
        // Aktivierung: ?admin=DEIN_SECRET an beliebige URL hängen
        // Speichert in sessionStorage → gilt nur für diesen Tab/Session
        (function initAdmin() {
            const params = new URLSearchParams(location.search);
            const secret = params.get('admin');
            if (secret) {
                sessionStorage.setItem(ADMIN_KEY, secret);
                // Secret aus URL entfernen (clean URL)
                params.delete('admin');
                const cleanUrl = location.pathname + (params.toString() ? '?' + params.toString() : '') + location.hash;
                history.replaceState(null, '', cleanUrl);
            }
        })();

        function isAdmin() {
            return !!sessionStorage.getItem(ADMIN_KEY);
        }

        function getAdminSecret() {
            return sessionStorage.getItem(ADMIN_KEY) || '';
        }

        // Workshop-ID aus URL extrahieren: /w/{id}/details
        function getWorkshopId() {
            const match = window.location.pathname.match(/\/w\/([a-f0-9]{32})/);
            return match ? match[1] : null;
        }

        function getFavorites() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
            catch { return []; }
        }

        function toggleFavorite(id) {
            const favs = getFavorites();
            const idx = favs.indexOf(id);
            if (idx > -1) favs.splice(idx, 1);
            else favs.push(id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(favs));
            return favs.includes(id);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        /**
         * Rendert Referent + Firma unterhalb der Meta-Zeile im Workshop-Card.
         * Firma ist anklickbar wenn der Aussteller existiert → öffnet Standplan.
         */
        function renderReferentFirma(ws) {
            // Referent/Firma nur anzeigen wenn Status "Referent bestätigt"
            if (ws.status !== 'Referent bestätigt') return '';

            const persons = ws.referent_persons || [];
            const firmaText = ws.referent_firma || '';
            const aussteller = ws.aussteller || [];

            if (persons.length === 0 && !firmaText && aussteller.length === 0) return '';

            let html = '<div style="margin-top:.6rem;font-size:.85rem;color:var(--text-light)">';

            // Referent Person(en) – verlinkt zur Experten-Seite
            if (persons.length > 0) {
                const personLinks = persons.map(p =>
                    `<a href="/experte.html#id=${p.id}" style="color:var(--text-light);text-decoration:underline;text-decoration-color:var(--as-rot);text-underline-offset:2px">${escapeHtml(p.name)}</a>`
                ).join(', ');
                html += `<span>🎤 ${personLinks}</span>`;
            }

            // Firma(s): Aussteller-Links haben Vorrang, dann referent_firma als Fallback
            if (aussteller.length > 0) {
                const links = aussteller.map(a => {
                    if (a.stand) {
                      return `<span data-show-stand="${escapeHtml(a.stand)}" data-firma="${escapeHtml(a.firma)}">🏪 ${escapeHtml(a.firma)} [Stand ${escapeHtml(a.stand)}]</span>`;
                    }
                    return `<span>🏪 ${escapeHtml(a.firma)}</span>`;
                });
                html += `<div style="margin-top:.35rem">${links.join(', ')}</div>`;
            } else if (firmaText) {
                html += `<div style="margin-top:.35rem">${escapeHtml(firmaText)}</div>`;
            }

            html += '</div>';
            return html;
        }

        async function loadDetails() {
            const wsId = getWorkshopId();
            if (!wsId) {
                showError('Workshop-ID nicht gefunden.');
                return;
            }

            // Back-Link setzen (mit Filter-State falls vorhanden)
            const params = new URLSearchParams(location.search);
            backUrl = params.get('back');
            document.getElementById('back-link').href = backUrl || ('/w/' + wsId);

            try {
                const ts = '?t=' + Date.now();
                const [wsData, ausData] = await Promise.all([
                    fetch(API_URL + ts).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
                    fetch(AUSSTELLER_URL + ts).then(r => r.ok ? r.json() : { aussteller: [] }).catch(() => ({ aussteller: [] }))
                ]);
                const ws = (wsData.workshops || []).find(w => w.id === wsId);

                if (!ws) {
                    showError('Workshop nicht gefunden (ID: ' + wsId + ', Count: ' + (wsData.workshops||[]).length + ').');
                    return;
                }

                document.title = ws.title + ' – AS26 Live';
                renderDetails(ws, wsData.workshops || [], ausData.aussteller || []);
            } catch (err) {
                console.error('Details-Fehler:', err);
                showError('Details konnten nicht geladen werden.<br><small>' + err.message + '</small>');
            }
        }

        function renderAehnlicheVeranstaltungen(ws, allWorkshops) {
            const meineKats = new Set(ws.kategorien || []);
            if (meineKats.size === 0) return '';

            const scored = allWorkshops
                .filter(w => w.id !== ws.id)
                .map(w => {
                    const score = (w.kategorien || []).filter(k => meineKats.has(k)).length;
                    return { w, score };
                })
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score || (a.w.tag === ws.tag ? -1 : 1));

            if (scored.length === 0) return '';

            const top = scored.slice(0, 3);
            let html = '<section class="cross-link-section">';
            html += '<h3>Das könnte dich auch interessieren</h3>';
            html += '<div class="cross-link-scroll-wrap"><div class="cross-link-row">';
            top.forEach(({ w }) => {
                html += `<a href="/w/${escapeHtml(w.id)}/details" class="cross-link-card">
                    <span class="typ-badge" data-typ="${escapeHtml(w.typ)}">${escapeHtml(w.typ)}</span>
                    <strong>${escapeHtml(w.title)}</strong>
                    <span>${escapeHtml(w.tag)} · ${escapeHtml(w.zeit)}</span>
                </a>`;
            });
            html += '</div></div></section>';
            return html;
        }

        function renderPassendeAussteller(ws, alleAussteller) {
            const meineKats = new Set(ws.kategorien || []);
            if (meineKats.size === 0) return '';

            const bereitsVerlinkt = new Set((ws.aussteller || []).map(a => a.id));

            const scored = alleAussteller
                .filter(a => !bereitsVerlinkt.has(a.id))
                .map(a => {
                    const score = (a.kategorien || []).filter(k => meineKats.has(k)).length;
                    return { a, score };
                })
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score);

            if (scored.length === 0) return '';

            const top = scored.slice(0, 4);
            let html = '<section class="cross-link-section cross-link-aussteller">';
            html += '<h3>Andere Aussteller zum Thema</h3>';
            html += '<div class="cross-link-scroll-wrap"><div class="cross-link-row">';
            top.forEach(({ a }) => {
                const standInfo = a.stand ? ` · Stand ${escapeHtml(a.stand)}` : '';
                html += `<a href="/aussteller.html#id=${escapeHtml(a.id)}" class="cross-link-card">
                    ${a.logo_local ? `<img src="${escapeHtml(a.logo_local)}" alt="" class="cross-link-logo">` : ''}
                    <strong>${escapeHtml(a.firma)}</strong>
                    <span>${escapeHtml((a.kategorien || []).slice(0, 2).join(', '))}${standInfo}</span>
                </a>`;
            });
            html += '</div></div></section>';
            return html;
        }

        function renderDetails(ws, allWorkshops, allAussteller) {
            const container = document.getElementById('detail-content');
            const favs = getFavorites();
            const isFav = favs.includes(ws.id);

            let html = '';

            // Workshop Card (oben)
            html += `<div class="workshop-card">
                <span class="typ-badge" data-typ="${escapeHtml(ws.typ)}">${escapeHtml(ws.typ)}</span>
                <h1>${escapeHtml(ws.title)}</h1>
                <div class="meta-row">
                    ${ws.tag ? `<span class="meta-item">📅 ${escapeHtml(ws.tag)}</span>` : ''}
                    ${ws.zeit ? `<span class="meta-item">🕐 ${escapeHtml(ws.zeit)}</span>` : ''}
                    ${ws.ort ? `<span class="meta-item" data-show-ort="${escapeHtml(ws.ort)}">📍 ${escapeHtml(ws.ort)}</span>` : ''}
                </div>
                ${renderReferentFirma(ws)}
            </div>`;

            // Kalender-Funktion aktiv ab 01.06.2026
            const calendarActive = new Date() >= new Date('2026-06-01T00:00:00+02:00');

            // Action Buttons
            html += `<div class="detail-actions">
                ${ws.qa_enabled ? `<a href="/w/${ws.id}/qa" class="btn btn-primary">💬 Frage stellen</a>` : ''}
                ${calendarActive ? `<a href="/w/${ws.id}/ical" class="btn btn-secondary">📅 Kalender</a>` : ''}
                <button class="btn btn-secondary fav-toggle" id="fav-toggle" data-id="${ws.id}">
                    ${isFav ? '❤️ Gemerkt' : '🤍 Merken'}
                </button>
                <button class="btn btn-secondary" id="share-ws" data-id="${ws.id}" data-title="${escapeHtml(ws.title)}">
                    <svg style="vertical-align:middle;margin-right:.25rem" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 9V3l8 9-8 9v-6c-7.1 0-11.7 2.1-14.6 7C.8 15.3 4.2 10.1 14 9z"/></svg>Teilen
                </button>
            </div>`;

            // Admin: Review-Button (nur sichtbar wenn Admin-Modus aktiv)
            if (isAdmin()) {
                html += `<div class="admin-actions" style="margin:.8rem 0;padding:.6rem;background:#fff3cd;border:2px dashed #e76f51;border-radius:8px;text-align:center">
                    <span style="font-size:.75rem;color:#666;display:block;margin-bottom:.4rem">🔧 Admin</span>
                    <button class="btn btn-primary" id="send-review-btn" data-id="${ws.id}" data-title="${escapeHtml(ws.title)}"
                        style="background:#e76f51;border:none;font-weight:600">
                        📧 Review an Referent senden
                    </button>
                    <div id="review-result" style="margin-top:.5rem;font-size:.85rem"></div>
                </div>`;
            }

            // Page Content
            if (ws.has_content && ws.content_html) {
                // Wenn Content nicht mit einer Überschrift beginnt, Standard-Heading einfügen
                const startsWithHeading = /^\s*<h[1-6]\b/i.test(ws.content_html);
                const heading = startsWithHeading ? '' : '<h3>Über diesen Vortrag</h3>';
                html += '<div class="detail-body">' + heading + ws.content_html + '</div>';
            } else if (ws.beschreibung) {
                html += '<div class="detail-body"><h3>Über diesen Vortrag</h3><p>' + escapeHtml(ws.beschreibung) + '</p></div>';
            } else {
                html += '<div class="empty">Keine weiteren Details verfügbar.</div>';
            }

            // (Referent + Firma wird jetzt im Workshop-Card via renderReferentFirma() gerendert)

            // Cross-Linking: Ähnliche Veranstaltungen + Passende Aussteller
            html += renderAehnlicheVeranstaltungen(ws, allWorkshops);
            html += renderPassendeAussteller(ws, allAussteller);

            // Zurück-Buttons
            html += `<div style="margin-top:2rem;text-align:center">
                <a href="/programm.html" class="btn btn-secondary">📋 Zum Programm</a>
            </div>`;

            container.innerHTML = html;

            // Fav-Toggle Event
            const favBtn = document.getElementById('fav-toggle');
            if (favBtn) {
                favBtn.addEventListener('click', () => {
                    const isNow = toggleFavorite(ws.id);
                    favBtn.innerHTML = isNow ? '❤️ Gemerkt' : '🤍 Merken';
                });
            }

            // Share Event
            const shareBtn = document.getElementById('share-ws');
            if (shareBtn) {
                shareBtn.addEventListener('click', () => {
                    const wsId = shareBtn.dataset.id;
                    const wsTitle = shareBtn.dataset.title;
                    const url = location.origin + '/w/' + wsId;
                    const shareData = { title: wsTitle + ' – AS26 Live', text: wsTitle, url: url };
                    if (navigator.share) {
                        navigator.share(shareData).catch(() => {});
                    } else {
                        location.href = 'mailto:?subject=' + encodeURIComponent(shareData.title) + '&body=' + encodeURIComponent(shareData.text + '\n\n' + shareData.url);
                    }
                });
            }

            // Admin: Review senden Event
            const reviewBtn = document.getElementById('send-review-btn');
            if (reviewBtn) {
                reviewBtn.addEventListener('click', async () => {
                    const wsId = reviewBtn.dataset.id;
                    const wsTitle = reviewBtn.dataset.title;
                    const resultEl = document.getElementById('review-result');

                    // Bestätigungsdialog
                    const deadlineDefault = new Date(Date.now() + 28 * 86400000).toISOString().split('T')[0];
                    const deadline = prompt(
                        `Review für "${wsTitle}" erstellen?\n\nDeadline (YYYY-MM-DD):`,
                        deadlineDefault
                    );
                    if (!deadline) return;

                    reviewBtn.disabled = true;
                    reviewBtn.textContent = '⏳ Wird erstellt…';
                    resultEl.textContent = '';

                    try {
                        const resp = await fetch('/api/send-review.php', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-Admin-Secret': getAdminSecret(),
                            },
                            body: JSON.stringify({ workshop_id: wsId, deadline: deadline }),
                        });
                        const data = await resp.json();

                        if (data.success) {
                            // Referenten-Liste aufbauen
                            let refLines = '';
                            if (data.emails && data.emails.length > 0) {
                                refLines = data.emails.map(e =>
                                    `<small>${e.ok ? '✅' : '⚠️'} ${e.name} (${e.email})</small>`
                                ).join('<br>');
                            }
                            if (data.referents_without_email && data.referents_without_email.length > 0) {
                                refLines += '<br>' + data.referents_without_email.map(n =>
                                    `<small>⚠️ ${n} – <em>keine E-Mail</em></small>`
                                ).join('<br>');
                            }
                            resultEl.innerHTML = `<span style="color:green">✅ Review erstellt!</span><br>
                                ${refLines}<br>
                                <small>📧 ${data.email_count} E-Mail-Draft(s) erstellt</small><br>
                                <a href="${data.review_url}" target="_blank" rel="noopener" style="color:#e76f51;font-weight:600">→ Review in Notion öffnen</a>`;
                            reviewBtn.textContent = '✅ Review erstellt';
                        } else {
                            resultEl.innerHTML = `<span style="color:red">❌ ${data.error || 'Unbekannter Fehler'}</span>
                                ${data.hint ? '<br><small>' + data.hint + '</small>' : ''}`;
                            reviewBtn.disabled = false;
                            reviewBtn.textContent = '📧 Review an Referent senden';
                        }
                    } catch (err) {
                        resultEl.innerHTML = `<span style="color:red">❌ Netzwerk-Fehler: ${err.message}</span>`;
                        reviewBtn.disabled = false;
                        reviewBtn.textContent = '📧 Review an Referent senden';
                    }
                });
            }
        }

        function showError(msg) {
            document.getElementById('detail-content').innerHTML =
                `<div class="empty">${msg}</div>`;
        }

        document.addEventListener('DOMContentLoaded', loadDetails);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    })();
    </script>
</body>
</html>
