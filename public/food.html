<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#372F2C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Food & Gastro – AS26 Live</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/img/icon-192.png">
    <link rel="apple-touch-icon" href="/img/icon-192.png">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/branding.js" defer></script>
</head>
<body>

    <header>
        <a href="/" class="back">← Startseite</a>
        <div class="badge">Food &amp; Gastro</div>
    </header>

    <!-- ── Food-Header ── -->
    <div class="food-header-banner">
        <p class="food-header-title">🍔 Food &amp; Gastro</p>
        <p class="food-header-sub">Verpflegung auf dem Messegelände</p>
    </div>

    <main>
        <!-- ── Filter ── -->
        <div class="food-filter-bar">
            <select id="food-halle-filter" class="kat-select">
                <option value="all">Alle Bereiche</option>
                <option value="FW">Foyer West</option>
                <option value="FG">Freigelände</option>
                <option value="A3">Halle A3</option>
                <option value="A4">Halle A4</option>
                <option value="A5">Halle A5</option>
                <option value="A6">Halle A6</option>
            </select>
        </div>

        <!-- ── Food-Anbieter-Liste ── -->
        <div id="food-list" class="food-section">
            <div class="food-empty">Food-Anbieter werden geladen…</div>
        </div>
    </main>

    <footer>
        <a href="/"><img src="/img/logo-southside.png" alt="" class="footer-logo" data-branding-logo></a>
        <p data-branding-event>Adventure Southside 2026</p>
        <div class="footer-cta-row">
            <a href="https://adventuresouthside.com/" target="_blank" rel="noopener" class="ticket-btn" data-branding-ticket>🎫 Ticket sichern</a>
            <button class="share-btn" onclick="window.AS_BRANDING?.share()"><svg style="vertical-align:middle;margin-right:.3rem" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 9V3l8 9-8 9v-6c-7.1 0-11.7 2.1-14.6 7C.8 15.3 4.2 10.1 14 9z"/></svg>Freunden empfehlen</button>
        </div>
        <p>
            <a href="/impressum.html">Impressum &amp; Datenschutz</a>
            &nbsp;·&nbsp;
            <a href="/faq.html">FAQ &amp; Hilfe</a>
        </p>
        <p class="app-version"></p>
    </footer>

    <script src="/js/food.js"></script>
    <script src="/js/ortmap.js"></script>
    <script src="/js/sw-update-notice.js"></script>
    <script src="/js/analytics.js" defer></script>
</body>
</html>
